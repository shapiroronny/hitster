name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - run: npm run build
      - name: Create index.html with cache-busted filenames
        run: |
          # Get the git short SHA for cache busting
          SHA=$(git rev-parse --short HEAD)
          # Rename build files with hash
          mv dist/hitster.js "dist/hitster.${SHA}.js"
          mv dist/hitster.css "dist/hitster.${SHA}.css"
          # Create index.html referencing hashed files
          cat > dist/index.html << HTMLEOF
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
            <title>Hitster</title>
            <link rel="stylesheet" href="hitster.${SHA}.css">
          </head>
          <body>
            <div id="hitster-game"></div>
            <script src="hitster.${SHA}.js"></script>
            <script>
              Hitster.init({
                container: '#hitster-game',
                spotifyClientId: '7002d9856f204ed6be87c73fec98e238',
              });
            </script>
          </body>
          </html>
          HTMLEOF
      - uses: actions/configure-pages@v4
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist
      - id: deployment
        uses: actions/deploy-pages@v4
